<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#0f1729"/>
      <stop offset="100%" stop-color="#0b0f19"/>
    </radialGradient>
    <linearGradient id="stroke" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3b9eff"/>
      <stop offset="60%" stop-color="#5b7fff"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <!-- Background -->
  <rect width="32" height="32" rx="8" fill="url(#bg)"/>
  <!-- Letter D with dream curve -->
  <path d="M9 8 L9 24 Q9 24 14 24 Q22 24 22 16 Q22 8 14 8 Z" 
        fill="none" stroke="url(#stroke)" stroke-width="2.5" 
        stroke-linejoin="round" filter="url(#glow)"/>
  <!-- Crescent moon inside D -->
  <path d="M14.5 12 A4 4 0 0 0 14.5 20 A3 3 0 0 1 14.5 12 Z" 
        fill="#7ba7ff" opacity="0.7"/>
  <!-- Star sparkle -->
  <circle cx="18" cy="11" r="1" fill="#a5c8ff" opacity="0.9"/>
  <path d="M18 9.5 L18.3 10.7 L19.5 11 L18.3 11.3 L18 12.5 L17.7 11.3 L16.5 11 L17.7 10.7 Z" 
        fill="#c4deff" opacity="0.8" transform="scale(0.5) translate(18,11)"/>
</svg>
